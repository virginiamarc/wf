<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Your global CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/checkout.css">

    <link rel="icon" type="image/x-icon" href="favicon_io/favicon-wf.ico">

    <!-- Dark Mode Favicon -->
    <link rel="icon" type="image/png" href="favicon_io/favicon-dark.png" media="(prefers-color-scheme: dark)">

    <!-- Apple Touch Icon (iPhone Home Screen) -->
    <link rel="apple-touch-icon" href="favicon_io/favicon-180.png">

        (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':

        })(window,document,'script','dataLayer','GTM-5M964BHH')

<body class="checkout-page">

    <!-- Google Tag Manager (noscript) -->
    <noscript> 
        <iframe src="https://www.googletagmanager.com/ns.html?id=GTM-5M964BHH"
        height="0" width="0" style="display:none;visibility:hidden"></iframe>
    </noscript>
    <!-- End Google Tag Manager (noscript) -->

    <!-- HEADER (same as your other pages) -->
    <header class="site-header">
        <div class="header-inner">
            <div class="header-left">
                <div class="logo">
                    <a href="index.html">
                        <img src="assets/media/logo.png" alt="Logo">
                    </a>
                </div>
                <h1 class="site-title">Wheel Foodie</h1>
            </div>

            <!-- GROUP NAV + ACCOUNT + CART -->
            <div class="header-center">
                <nav class="main-nav">
                    <ul>
                        <li><a href="index.html" aria-current="page">Home</a></li>
                        <li><a href="menu.html">Menu</a></li>
                        <li><a href="specials.html">Specials</a></li>
                        <li><a href="locations.html">Locations</a></li>
                        <li><a href="about.html">About</a></li>
                        <li><a href="catering.html">Catering</a></li>
                    </ul>
                </nav>

                <div class="utility-nav">
                    <div class="account-menu">
                        <span class="account-label">
                            <svg class="user-icon" viewBox="0 0 24 24">
                                <circle cx="12" cy="7" r="4"></circle>
                                <path d="M5 21c0-4 3-7 7-7s7 3 7 7"></path>
                            </svg>
                            Account ▾
                        </span>

                        <ul class="account-dropdown">
                            <li><a href="login.html">Login</a></li>
                            <li><a href="register.html">Register</a></li>
                        </ul>
                    </div>

                    <a href="checkout.html" class="cart-icon">
                        🛒 <span class="cart-count">0</span>
                    </a>
                </div>
            </div>

            <button class="hamburger">&#9776;</button>
        
        </div>
    </header>

    <main class="checkout-container">

        <!-- ⭐ LEFT COLUMN: USER OPTIONS + CONTACT INFO -->
        <section class="checkout-left">
            <div class="checkout-left-inner">
                
                <h2>Checkout</h2>

                <!-- LOGIN / GUEST OPTIONS -->
                <div class="auth-options">
                    <button class="btn-secondary full">Continue as Guest</button>
                    <button class="btn-orange full">Login</button>
                    <button class="btn-orange full">Create Account</button>
                </div>

                <!-- CONTACT INFO FORM -->
                <div class="checkout-section">
                    <h3>Contact Information</h3>

                    <form id="checkout-form">
                        <label>
                            Full Name
                            <input type="text" id="fullName" required>
                        </label>

                        <label>
                            Email
                            <input type="email" id="email" required>
                        </label>

                        <label>
                            Phone Number
                            <input type="tel" id="phone" required>
                        </label>
                    </form>
                </div>

                <!-- PAYMENT BUTTON -->
                <button id="placeOrderBtn" class="checkout-btn full">
                    Proceed to Payment
                </button>
            </div>
        </section>

        <!-- ⭐ RIGHT COLUMN: ORDER SUMMARY -->
        <aside class="checkout-right">

            <h3>Your Order</h3>

            <div id="checkout-items"></div>

            <div class="checkout-totals">
                <div class="row">
                    <span>Subtotal</span>
                    <span id="subtotal">$0.00</span>
                </div>

                <div class="row">
                    <span>Tax</span>
                    <span id="tax">$0.00</span>
                </div>

                <div class="row total">
                    <span>Total</span>
                    <span id="total">$0.00</span>
                </div>
            </div>

        </aside>

    </main>
    
    <footer class="checkout-footer">
        <p>© 2026 Wheel Foodie™. All rights reserved.</p>
        <p><a href="privacy.html">Privacy Policy</a> • <a href="terms.html">Terms of Service</a></p>
    </footer>

    <!-- GLOBAL SCRIPTS -->
    <script src="assets/js/cart-state.js"></script>
    <script src="assets/js/cart-storage.js"></script>
    <script src="assets/js/cart-ui.js"></script>
    <script src="assets/js/checkout.js"></script>
    <script src="assets/js/script.js" defer></script>

</body>
</html>
